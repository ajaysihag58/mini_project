<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FaceTrack — AI-powered student attendance system using real-time facial recognition">
    <title>FaceTrack — Smart Attendance System</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- ─── Loading Overlay ─────────────────────────────────── -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader">
            <div class="loader-ring"></div>
            <div class="loader-ring ring-2"></div>
            <div class="loader-icon">
                <span class="material-icons-round">face</span>
            </div>
        </div>
        <p class="loader-text">Loading<span class="dot-animation">...</span></p>
    </div>

    <!-- ─── Toast Container ─────────────────────────────────── -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ─── App Layout ──────────────────────────────────────── -->
    <div class="app-layout">

        <!-- Top Navbar -->
        <header class="topbar" id="topbar">
            <div class="topbar-inner">
                <!-- Logo -->
                <div class="logo">
                    <div class="logo-icon-wrapper">
                        <span class="material-icons-round logo-icon">face</span>
                    </div>
                    <h1>FaceTrack</h1>
                </div>

                <!-- Navigation -->
                <nav class="topbar-nav" id="topbar-nav">
                    <a href="#dashboard" class="nav-link active" data-page="dashboard" id="nav-dashboard">
                        <span class="material-icons-round">dashboard</span>
                        <span>Dashboard</span>
                    </a>
                    <a href="#attendance" class="nav-link" data-page="attendance" id="nav-attendance">
                        <span class="material-icons-round">fact_check</span>
                        <span>Mark Attendance</span>
                    </a>
                    <a href="#register" class="nav-link" data-page="register" id="nav-register">
                        <span class="material-icons-round">person_add</span>
                        <span>Register Student</span>
                    </a>
                    <a href="#records" class="nav-link" data-page="records" id="nav-records">
                        <span class="material-icons-round">assignment</span>
                        <span>Records</span>
                    </a>
                </nav>



                <!-- Mobile Toggle -->
                <button class="mobile-nav-toggle" id="mobile-nav-toggle">
                    <span class="material-icons-round">menu</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div id="page-content" class="page-content">
                <!-- Dynamic content loaded here by SPA router -->
            </div>
        </main>
    </div>

    <!-- ─── Scripts ─────────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/face.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/register.js"></script>
    <script src="/js/attendance.js"></script>
    <script src="/js/records.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
